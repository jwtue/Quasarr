services:
  quasarr:
    container_name: 'Quasarr'
    image: 'ghcr.io/rix1337/quasarr:latest'
    ports:
      - '8080:8080'
    volumes:
      - '/path/to/config/:/config:rw'
    environment:
      - 'INTERNAL_ADDRESS=http://192.168.1.1:8080'
      - 'EXTERNAL_ADDRESS=https://foo.bar/'
      - 'USER=admin'
      - 'PASS=change-me'
      - 'AUTH=form'
      - 'TZ=Europe/Berlin'

  # Optional (sponsor-only): automatic CAPTCHA solving / decryption helper
  sponsorshelper:
    container_name: 'SponsorsHelper'
    image: 'ghcr.io/rix1337/sponsors-helper:latest'
    restart: unless-stopped
    depends_on:
      - quasarr
      - flaresolverr-next
    volumes:
      - '/path/to/sponsorshelper-config:/config'
    environment:
      - 'QUASARR_URL=http://192.168.0.1:8080'
      - 'QUASARR_API_KEY=your_quasarr_api_key_here'
      - 'FLARESOLVERR_URL=http://flaresolverr-next:8191/v1'
      - 'APIKEY_2CAPTCHA=your_2captcha_api_key_here'
      - 'TZ=Europe/Berlin'

  flaresolverr-next:
    container_name: 'flaresolverr-next'
    image: 'ghcr.io/rix1337/flaresolverr-next:latest'
    restart: unless-stopped
    environment:
      - 'TZ=Europe/Berlin'

  magazarr:
    container_name: 'Magazarr'
    image: 'ghcr.io/rix1337/magazarr:latest'
    restart: unless-stopped
    depends_on:
      - quasarr
    ports:
      - '8090:8090'
    volumes:
      - '/path/to/magazarr-config:/config:rw'
      - '/path/to/magazine-library:/library:rw'
      - '/path/to/jdownloader-output:/downloads:rw'
    environment:
      - 'TZ=Europe/Berlin'
      - 'PORT=8090'
      - 'LISTEN=0.0.0.0'

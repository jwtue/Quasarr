name: PR Check Feedback

# Posts the fork-PR check checklist (produced by pre-commit.py --check in the
# "Pull Requests" workflow) as a sticky comment on the PR. Runs in the base-repo
# context via workflow_run, so it has a write token even for forks. It only
# reads the uploaded artifact (data files) and never executes PR code.

on:
  workflow_run:
    workflows: [ "Pull Requests" ]
    types: [ completed ]

permissions:
  pull-requests: write
  actions: read

jobs:
  comment:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check for report artifact
        id: art
        uses: actions/github-script@v7
        with:
          script: |
            const arts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });
            const found = arts.data.artifacts.some(a => a.name === 'pr-check-report');
            core.setOutput('found', found ? 'true' : 'false');

      - name: Download report
        if: steps.art.outputs.found == 'true'
        uses: actions/download-artifact@v4
        with:
          name: pr-check-report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Post or update sticky checklist comment
        if: steps.art.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- quasarr-pr-checks -->';
            const pr = parseInt(fs.readFileSync('pr_number.txt', 'utf8').trim(), 10);
            if (!Number.isInteger(pr)) { core.info('No valid PR number; skipping.'); return; }
            const report = fs.readFileSync('pr_check_report.md', 'utf8');
            const body = `${marker}\n${report}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: pr,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr, body,
              });
            }
